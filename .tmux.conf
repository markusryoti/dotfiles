set -g default-shell $SHELL

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -ga terminal-overrides ",alacritty:Tc"
set -ga terminal-overrides ",wezterm:Tc"
set -ga terminal-overrides ",ghostty:Tc"

# Undercurl support (for LSP diagnostics in Neovim)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

set -g history-limit 100000        # massive scrollback
set -g buffer-limit 20
set -s escape-time 0               # zero delay (critical for Neovim)
set -g repeat-time 300             # time for repeatable commands
set -g focus-events on             # pass focus events to apps (Neovim autoread)
set -g mouse on                    # mouse support
set -g base-index 1                # windows start at 1
set -g pane-base-index 1           # panes start at 1
set -g renumber-windows on         # auto-renumber on close
set -g set-titles on               # update terminal title
set -g set-titles-string "#S · #W"
set -g detach-on-destroy off       # go to another session on destroy
set -g display-time 2000           # status message display time (ms)
set -g status-interval 5           # refresh status every 5s

# ── Word separators (better double-click selection) ──────────
set -g word-separators " =-+@[]{}()|;:<>,."

# ── Window options ───────────────────────────────────────────
setw -g automatic-rename on        # auto-name window from running process
setw -g aggressive-resize on       # resize to smallest *active* client
setw -g monitor-activity on        # flag windows with activity

# ── Config reload ────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display-message " Config reloaded!"

# ── Sessions ────────────────────────────────────────────────
bind S command-prompt -p "New session:" "new-session -A -s '%%'"   # new/attach named session
bind C-s display-popup -E "tmux list-sessions | sed 's/:.*$//' | fzf --reverse | xargs tmux switch-client -t"
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

# ── Windows ─────────────────────────────────────────────────
bind c   new-window -c "#{pane_current_path}"   # open in current dir
bind C-c new-window                              # open in home
bind ,   command-prompt -I "#{window_name}" "rename-window '%%'"
bind w   choose-tree -Zw                        # window/session picker
bind Tab last-window                            # toggle between last two windows

# Move windows
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# ── Pane splitting (open in current path) ────────────────────
bind "|"  split-window -h -c "#{pane_current_path}"
bind "\\" split-window -fh -c "#{pane_current_path}"   # full-width vertical
bind "-"  split-window -v -c "#{pane_current_path}"
bind "_"  split-window -fv -c "#{pane_current_path}"   # full-height horizontal
unbind '"'
unbind %

# ── Pane navigation (vim-aware: works seamlessly with Neovim) ─
# Requires the tmux.nvim plugin on the Neovim side (configured in extras.lua)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Clear terminal + tmux scrollback (replaces C-l clear in plain shells)
# Doesn't work
# bind C-l send-keys C-l \; clear-history

bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

# ── Pane resizing (hold prefix, repeat with arrow keys) ──────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Pane management ─────────────────────────────────────────
bind z   resize-pane -Z                         # toggle zoom
bind !   break-pane                             # break pane into new window
bind m   select-pane -m                         # mark pane
bind M   join-pane -s '{marked}'                # join marked pane here
bind q   display-panes -d 0                     # show pane numbers (hold)
bind o   rotate-window                          # rotate panes in window

# ── Layouts ─────────────────────────────────────────────────
bind e   select-layout even-horizontal
bind E   select-layout even-vertical
bind t   select-layout tiled
bind M-1 select-layout main-horizontal
bind M-2 select-layout main-vertical

# ── Copy mode (vi-style) ─────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode                            # enter copy mode
bind -T copy-mode-vi v     send -X begin-selection
bind -T copy-mode-vi C-v   send -X rectangle-toggle
bind -T copy-mode-vi y     send -X copy-selection-and-cancel
bind -T copy-mode-vi Y     send -X copy-end-of-line
bind -T copy-mode-vi H     send -X start-of-line
bind -T copy-mode-vi L     send -X end-of-line
bind -T copy-mode-vi Escape send -X cancel
# Fast search
bind -T copy-mode-vi / command-prompt -i -p "(search down)" "send -X search-forward-incremental '%%%'"
bind -T copy-mode-vi ? command-prompt -i -p "(search up)" "send -X search-backward-incremental '%%%'"

# ── Clipboard integration ────────────────────────────────────
# macOS
if -b 'command -v pbcopy > /dev/null 2>&1' {
  bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
  bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"
}
# Linux (X11)
if -b 'command -v xclip > /dev/null 2>&1' {
  bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"
  bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "xclip -selection clipboard"
}
# Linux (Wayland)
if -b 'command -v wl-copy > /dev/null 2>&1' {
  bind -T copy-mode-vi y send -X copy-pipe-and-cancel "wl-copy"
  bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"
}

# ── Popups & utilities ───────────────────────────────────────
# Lazygit popup (same as <leader>gg in Neovim)
bind g display-popup -E -w 92% -h 92% "lazygit"

# btop system monitor
bind B display-popup -E -w 95% -h 95% "btop"

# FZF session switcher
bind f display-popup -E "~/.tmux/scripts/sessionizer.sh"

# FZF file finder → open in new window
bind o display-popup -E -w 60% -h 60% \
  "fd --type f --hidden --exclude .git | fzf --reverse --preview 'bat --style=numbers --color=always {}' | xargs -r tmux new-window -c '#{pane_current_path}' -n '{}' nvim"

# Quick scratch terminal
bind i display-popup -E -w 80% -h 80%

# ═══════════════════════════════════════════════════════════╗
#  CATPPUCCIN MOCHA THEME                                    ║
#  Matching the Neovim colorscheme                           ║
# ═══════════════════════════════════════════════════════════╝

# Catppuccin Mocha palette
color_bg="#1e1e2e"          # base
color_surface0="#313244"    # surface0
color_surface1="#45475a"    # surface1
color_overlay0="#6c7086"    # overlay0
color_subtext="#bac2de"     # subtext1
color_text="#cdd6f4"        # text
color_lavender="#b4befe"    # lavender
color_blue="#89b4fa"        # blue
color_sapphire="#74c7ec"    # sapphire
color_sky="#89dceb"         # sky
color_teal="#94e2d5"        # teal
color_green="#a6e3a1"       # green
color_yellow="#f9e2af"      # yellow
color_peach="#fab387"       # peach
color_maroon="#eba0ac"      # maroon
color_red="#f38ba8"         # red
color_mauve="#cba6f7"       # mauve
color_pink="#f5c2e7"        # pink
color_flamingo="#f2cdcd"    # flamingo
color_rosewater="#f5e0dc"   # rosewater

# ── Pane borders ────────────────────────────────────────────
set -g pane-border-style "fg=$color_surface1"
set -g pane-active-border-style "fg=$color_blue"
set -g pane-border-lines single

# ── Messages ────────────────────────────────────────────────
set -g message-style "fg=$color_text,bg=$color_surface0"
set -g message-command-style "fg=$color_blue,bg=$color_surface0"

# ── Mode (copy mode etc.) ───────────────────────────────────
setw -g mode-style "fg=$color_bg,bg=$color_mauve"

# ── Status bar ──────────────────────────────────────────────
set -g status on
set -g status-position top             # status bar at top (like Neovim tabline)
set -g status-justify left
set -g status-style "fg=$color_text,bg=$color_bg"
set -g status-left-length 80
set -g status-right-length 120

# Powerline-style separators
sep_left=""
sep_right=""
sep_left_thin=""
sep_right_thin=""

# LEFT: session name block
set -g status-left "\
#[fg=$color_bg,bg=$color_mauve,bold] #{?client_prefix,󰘳 ,󰣇 }#S \
#[fg=$color_mauve,bg=$color_surface0]$sep_left\
#[fg=$color_text,bg=$color_surface0] #{=20:pane_current_path} \
#[fg=$color_surface0,bg=$color_bg]$sep_left "

# RIGHT: git, host, time
set -g status-right "\
#[fg=$color_surface0,bg=$color_bg]$sep_right\
#[fg=$color_subtext,bg=$color_surface0] #{?#{m:*/*,#{pane_current_path}},#(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null | sed 's/^/ /'),} \
#[fg=$color_surface1,bg=$color_surface0]$sep_right_thin\
#[fg=$color_subtext,bg=$color_surface0] #h \
#[fg=$color_blue,bg=$color_surface0]$sep_right\
#[fg=$color_bg,bg=$color_blue,bold] %H:%M \
#[fg=$color_mauve,bg=$color_blue]$sep_right\
#[fg=$color_bg,bg=$color_mauve,bold] %d %b "

# ── Window tabs ─────────────────────────────────────────────
# Inactive windows
setw -g window-status-style "fg=$color_subtext,bg=$color_surface0"
setw -g window-status-format "\
#[fg=$color_surface0,bg=$color_bg]$sep_left\
#[fg=$color_subtext,bg=$color_surface0] #I #W#{?window_activity_flag,  ,} \
#[fg=$color_surface0,bg=$color_bg]$sep_left"

# Active window
setw -g window-status-current-style "fg=$color_bg,bg=$color_blue,bold"
setw -g window-status-current-format "\
#[fg=$color_bg,bg=$color_blue]$sep_left\
 #I #W#{?window_zoomed_flag,  , } \
#[fg=$color_blue,bg=$color_bg]$sep_left"

# Window with activity
setw -g window-status-activity-style "fg=$color_yellow,bg=$color_bg"

# ── Popup style ─────────────────────────────────────────────
# set -g popup-border-lines rounded
# set -g popup-border-style "fg=$color_blue"

# ── Clock ───────────────────────────────────────────────────
setw -g clock-mode-colour "$color_mauve"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'     # sane defaults
set -g @plugin 'tmux-plugins/tmux-resurrect'    # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'    # auto save/restore
set -g @plugin 'tmux-plugins/tmux-yank'         # system clipboard yank
set -g @plugin 'tmux-plugins/tmux-open'         # open URLs/files from copy mode
set -g @plugin 'fcsonline/tmux-thumbs'          # hint-mode URL/path picking
set -g @plugin 'sainnhe/tmux-fzf'               # fzf integration

# ── Plugin config ────────────────────────────────────────────

# Resurrect: restore Neovim sessions too
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-save 'M-s'
set -g @resurrect-restore 'M-r'

# Continuum: auto-save every 15 min, auto-restore on start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tmux-yank: vi-mode stay in copy mode after yank
set -g @yank_action 'copy-pipe-no-clear'
set -g @yank_with_mouse off

# tmux-thumbs: copy-mode hints (like EasyMotion for the terminal)
set -g @thumbs-key space
set -g @thumbs-alphabet dvorak-homerow
set -g @thumbs-unique enabled
set -g @thumbs-command 'tmux set-buffer -w "{}"'
set -g @thumbs-osc52 1

# tmux-fzf
TMUX_FZF_LAUNCH_KEY="F"
TMUX_FZF_OPTIONS="-p -w 80% -h 60% -m"
TMUX_FZF_ORDER="session|window|pane|command|keybinding"

# ── Initialize TPM (keep this line at the very bottom) ───────
run '~/.tmux/plugins/tpm/tpm'
